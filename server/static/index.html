<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4A90D9">
<title>考研背诵</title>
<style>
:root {
  --primary: #4A90D9;
  --success: #52C41A;
  --danger: #FF4D4F;
  --warning: #FAAD14;
  --bg: #F2F3F7;
  --card-bg: #FFFFFF;
  --text: #1A1A2E;
  --text-sub: #8E8E93;
  --nav-inactive: #8E8E93;
  --radius: 16px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); overflow: hidden; height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
#app { display: flex; flex-direction: column; height: 100dvh; }
.page { display: none; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px; }
.page.active { display: flex; flex-direction: column; }

/* Bottom Nav */
#bottom-nav {
  display: flex; background: var(--card-bg); border-top: 1px solid #E8EDF2;
  padding-bottom: var(--safe-bottom); flex-shrink: 0;
}
.nav-item {
  flex: 1; text-align: center; padding: 6px 0 4px; cursor: pointer;
  font-size: 11px; color: var(--nav-inactive); user-select: none;
  transition: color 0.2s;
}
.nav-item .nav-icon { font-size: 22px; display: block; margin-bottom: 1px; }
.nav-item.active { color: var(--primary); }

/* Header */
.header {
  display: flex; align-items: center; padding: 16px 0 12px; gap: 12px; flex-shrink: 0;
}
.header-title { font-size: 20px; font-weight: 700; }
.header-back {
  font-size: 16px; color: var(--primary); cursor: pointer; padding: 4px 4px 4px 0;
  display: flex; align-items: center; gap: 4px;
}
.header-back:hover { opacity: 0.8; }
.header-sub { font-size: 16px; font-weight: 700; color: var(--text); }

/* Cards */
.list-card {
  background: var(--card-bg); border-radius: var(--radius); padding: 16px 18px;
  margin-bottom: 10px; cursor: pointer; transition: transform 0.15s;
}
.list-card:active { transform: scale(0.98); }
.list-card-row { display: flex; align-items: center; gap: 14px; }
.list-card-icon { font-size: 32px; flex-shrink: 0; }
.list-card-info { flex: 1; min-width: 0; }
.list-card-name { font-size: 16px; font-weight: 600; }
.list-card-meta { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
.list-card-arrow { font-size: 24px; color: #C7C7CC; flex-shrink: 0; }

.progress-bar {
  height: 5px; background: #E8EDF2; border-radius: 3px; margin-top: 6px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; border-radius: 3px; background: var(--primary); transition: width 0.3s;
}

/* Card Review */
#review-area { flex: 1; display: flex; flex-direction: column; }
#review-progress { display: flex; align-items: center; gap: 12px; padding: 12px 0; flex-shrink: 0; }
#review-progress .progress-bar { flex: 1; margin-top: 0; }
#review-counter { font-size: 13px; color: var(--text-sub); white-space: nowrap; }
#flashcard {
  flex: 1; margin: 8px 0 16px; perspective: 1000px; cursor: pointer;
  display: flex; min-height: 0;
}
#flashcard-inner {
  position: relative; width: 100%; transition: transform 0.5s ease; transform-style: preserve-3d;
  border-radius: 20px; min-height: 200px;
}
#flashcard-inner.flipped { transform: rotateX(180deg); }
.card-face {
  position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--card-bg); border-radius: 20px; padding: 24px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow-y: auto;
}
.card-face-back { transform: rotateX(180deg); }
.card-word { font-size: 28px; font-weight: 700; color: var(--text); text-align: center; }
.card-phonetic { font-size: 15px; color: var(--text-sub); margin-top: 4px; }
.card-def { font-size: 15px; color: #2C3E50; text-align: center; margin-top: 8px; line-height: 1.5; white-space: pre-line; }
.card-example { font-size: 13px; color: var(--text-sub); text-align: center; margin-top: 6px; }
.card-detail { font-size: 13px; color: #2C3E50; text-align: center; line-height: 1.5; white-space: pre-line; margin-top: 8px; }
.card-speak {
  display: inline-flex; align-items: center; gap: 4px; margin-top: 14px;
  color: var(--primary); font-size: 14px; font-weight: 600; cursor: pointer;
}
.card-speak:hover { opacity: 0.7; }
.card-hint { font-size: 12px; color: #C7C7CC; margin-top: 10px; }
.card-face-back .card-hint { margin-top: auto; }

/* Buttons */
.action-row { display: flex; gap: 10px; padding-bottom: calc(12px + var(--safe-bottom)); flex-shrink: 0; }
.action-row .btn { flex: 1; height: 48px; border-radius: 24px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; color: #fff; transition: opacity 0.15s; }
.action-row .btn:active { opacity: 0.8; }
.btn-unknown { background: var(--danger); }
.btn-known { background: var(--success); }

/* Summary */
#summary { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.summary-emoji { font-size: 48px; margin-bottom: 8px; }
.summary-title { font-size: 24px; font-weight: 700; }
.summary-meta { font-size: 14px; color: var(--text-sub); margin-top: 4px; }
.summary-bar { width: 200px; height: 6px; background: #FFE0E0; border-radius: 3px; margin-top: 12px; overflow: hidden; }
.summary-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.summary-pct { font-size: 14px; font-weight: 700; margin-top: 6px; }
.summary-actions { display: flex; gap: 10px; margin-top: 20px; }
.summary-actions .btn { padding: 0 28px; height: 40px; border-radius: 20px; border: none; font-size: 14px; cursor: pointer; }
.summary-actions .btn:active { opacity: 0.8; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-secondary { background: #E8EDF2; color: var(--text); }

/* Stats */
.stats-card { background: var(--card-bg); border-radius: var(--radius); padding: 0 18px; }
.stat-row { display: flex; justify-content: space-between; padding: 12px 0; }
.stat-label { font-size: 14px; color: var(--text-sub); }
.stat-value { font-size: 16px; font-weight: 700; color: var(--text); }
.stat-divider { height: 1px; background: #E8EDF2; margin: 0; }
.subject-progress { margin-top: 16px; }
.section-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
.subj-stat { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sub); margin-top: 2px; }

/* Import */
.import-card { background: var(--card-bg); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; }
.import-label { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.import-radio-group { display: flex; gap: 20px; margin-bottom: 10px; }
.import-radio { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
.import-radio input { accent-color: var(--primary); }
.import-input {
  width: 100%; height: 36px; border: 1px solid #E8EDF2; border-radius: 8px;
  padding: 0 12px; font-size: 14px; outline: none; margin-bottom: 10px;
}
.import-input:focus { border-color: var(--primary); }
.import-file-row { display: flex; gap: 10px; align-items: center; }
.import-file-row .file-name { flex: 1; font-size: 13px; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.import-btn { height: 36px; padding: 0 20px; border-radius: 18px; border: none; font-size: 13px; cursor: pointer; white-space: nowrap; }
.import-btn:active { opacity: 0.8; }
.import-btn-primary { background: var(--primary); color: #fff; }
.import-btn-primary:disabled { background: #B0C4DE; cursor: not-allowed; }
.import-preview { max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
.preview-item { background: var(--card-bg); border-radius: 8px; padding: 6px 12px; margin-bottom: 4px; }
.preview-item .p-front { font-size: 13px; font-weight: 600; }
.preview-item .p-back { font-size: 12px; color: var(--text-sub); }
.import-status { font-size: 13px; color: var(--text-sub); text-align: center; }
.status-ok { color: var(--success); }
.status-err { color: var(--danger); }

/* Hidden file input */
#file-input { display: none; }

/* Scrollable topics */
.scroll-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-top: 4px; }

/* Empty state */
.empty-state { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-sub); }

/* PWA splash */
@media (display-mode: standalone) {
  body { padding-top: env(safe-area-inset-top); }
}
</style>
</head>
<body>
<div id="app">

<!-- Subjects Page -->
<div id="page-subjects" class="page active">
  <div class="header"><div class="header-title">考研背诵</div></div>
  <div style="font-size:13px;color:var(--text-sub);margin-bottom:12px;">选择科目开始学习</div>
  <div class="scroll-content" id="subject-list"></div>
</div>

<!-- Topics Page -->
<div id="page-topics" class="page">
  <div class="header">
    <span class="header-back" onclick="showPage('subjects')">‹ 返回</span>
    <span class="header-sub" id="topic-header-subject"></span>
  </div>
  <div class="scroll-content" id="topic-list"></div>
</div>

<!-- Cards Page -->
<div id="page-cards" class="page">
  <div class="header">
    <span class="header-back" id="cards-back" onclick="backFromCards()">‹ 返回</span>
    <span class="header-sub" id="cards-header-topic"></span>
  </div>
  <div id="review-area">
    <div id="review-progress">
      <span id="review-counter"></span>
      <div class="progress-bar"><div class="progress-bar-fill" id="review-bar" style="width:0%"></div></div>
    </div>
    <div id="flashcard">
      <div id="flashcard-inner">
        <div class="card-face" id="face-front">
          <div class="card-word" id="card-word"></div>
          <div class="card-phonetic" id="card-phonetic"></div>
          <div class="card-speak" id="card-speak-btn">🔊 点击朗读</div>
          <div class="card-def" id="card-def"></div>
          <div class="card-example" id="card-example"></div>
          <div class="card-hint">点击卡片翻转</div>
        </div>
        <div class="card-face card-face-back" id="face-back">
          <div class="card-word" id="back-word"></div>
          <div class="card-detail" id="back-detail"></div>
          <div class="card-example" id="back-example"></div>
          <div class="card-hint">点击查看单词</div>
        </div>
      </div>
    </div>
    <div class="action-row">
      <button class="btn btn-unknown" onclick="answerCard(0)">不认识</button>
      <button class="btn btn-known" onclick="answerCard(1)">认识</button>
    </div>
    <div id="summary" style="display:none;"></div>
  </div>
</div>

<!-- Profile Page -->
<div id="page-profile" class="page">
  <div class="header"><div class="header-title">学习统计</div></div>
  <div id="profile-content"></div>
</div>

<!-- Import Page -->
<div id="page-import" class="page">
  <div class="header"><div class="header-title">导入学习资料</div></div>
  <div style="font-size:13px;color:var(--text-sub);margin-bottom:12px;">支持 CSV / JSON / TXT 格式</div>
  <div id="import-content" style="flex:1;overflow-y:auto;"></div>
</div>

<!-- Bottom Nav -->
<div id="bottom-nav">
  <div class="nav-item active" data-tab="subjects" onclick="switchTab('subjects')">
    <span class="nav-icon">📖</span>背诵
  </div>
  <div class="nav-item" data-tab="import" onclick="switchTab('import')">
    <span class="nav-icon">📥</span>导入
  </div>
  <div class="nav-item" data-tab="profile" onclick="switchTab('profile')">
    <span class="nav-icon">👤</span>我的
  </div>
</div>

</div>

<script>
const API = '';
let currentSubject = null;
let currentTopic = null;
let cards = [];
let cardIndex = 0;
let cardResults = [];
let isFlipped = false;
let isFinished = false;

// --- Navigation ---
function switchTab(tab) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'subjects') loadSubjects();
  if (tab === 'profile') loadProfile();
  if (tab === 'import') renderImport();
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
}

function backFromCards() {
  if (currentSubject) showTopics(currentSubject);
  else showPage('subjects');
}

// --- API Helpers ---
async function api(url, opts = {}) {
  const res = await fetch(API + url, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// --- Subjects ---
async function loadSubjects() {
  const subs = await api('/api/subjects');
  const list = document.getElementById('subject-list');
  list.innerHTML = subs.map(s => `
    <div class="list-card" onclick="showTopics({id:${s.id},name:'${s.display_name}','display_name':'${s.display_name}','icon':'${s.icon}'})">
      <div class="list-card-row">
        <div class="list-card-icon">${s.icon}</div>
        <div class="list-card-info">
          <div class="list-card-name">${s.display_name}</div>
          <div class="list-card-meta">${s.reviewed_cards}/${s.total_cards} 已掌握</div>
          <div class="progress-bar"><div class="progress-bar-fill" style="width:${s.progress_pct}%"></div></div>
        </div>
        <div class="list-card-arrow">›</div>
      </div>
    </div>
  `).join('');
}

// --- Topics ---
async function showTopics(subject) {
  currentSubject = subject;
  document.getElementById('topic-header-subject').textContent = subject.display_name;
  const tops = await api(`/api/subjects/${subject.id}/topics`);
  const list = document.getElementById('topic-list');
  list.innerHTML = tops.map(t => {
    const label = t.reviewed_cards > 0 ? '复习' : '开始';
    return `
      <div class="list-card" onclick="startReview(${t.id},'${t.name.replace(/'/g,"\\'")}',${subject.id})">
        <div class="list-card-row">
          <div class="list-card-info">
            <div class="list-card-name">${t.name}</div>
            <div class="list-card-meta">${t.reviewed_cards}/${t.total_cards}</div>
            <div class="progress-bar"><div class="progress-bar-fill" style="width:${t.progress_pct}%"></div></div>
          </div>
          <button class="btn btn-primary" style="width:60px;height:30px;font-size:13px;border-radius:15px;flex:none;padding:0;" onclick="event.stopPropagation();startReview(${t.id},'${t.name.replace(/'/g,"\\'")}',${subject.id})">${label}</button>
        </div>
      </div>
    `;
  }).join('');
  showPage('topics');
}

// --- Card Review ---
async function startReview(topicId, topicName, subjectId) {
  currentTopic = { id: topicId, name: topicName, subject_id: subjectId };
  cards = await api(`/api/topics/${topicId}/cards`);
  if (!cards.length) { alert('此章节暂无卡片'); return; }
  cardIndex = 0;
  cardResults = [];
  isFinished = false;
  isFlipped = false;
  document.getElementById('cards-header-topic').textContent = topicName;
  document.getElementById('summary').style.display = 'none';
  document.querySelector('.action-row').style.display = 'flex';
  document.getElementById('flashcard').style.display = 'flex';
  document.getElementById('review-progress').style.display = 'flex';
  showPage('cards');
  renderCard();
}

function renderCard() {
  if (cardIndex >= cards.length) { showSummary(); return; }
  const c = cards[cardIndex];
  isFlipped = false;
  document.getElementById('flashcard-inner').classList.remove('flipped');
  document.getElementById('card-word').textContent = c.front;
  document.getElementById('card-phonetic').textContent = c.phonetic || '';
  document.getElementById('card-def').textContent = c.back;
  document.getElementById('card-example').textContent = c.example ? '📝 ' + c.example : '';
  document.getElementById('back-word').textContent = c.front;
  document.getElementById('back-detail').textContent = c.back_detail || c.back;
  document.getElementById('back-example').textContent = c.example ? '📝 ' + c.example : '';
  document.getElementById('review-counter').textContent = `${cardIndex + 1}/${cards.length}`;
  document.getElementById('review-bar').style.width = `${(cardIndex / cards.length) * 100}%`;
  document.querySelectorAll('.action-row .btn').forEach(b => b.disabled = false);
  document.getElementById('summary').style.display = 'none';
}

function flipCard() {
  if (isFinished || cardIndex >= cards.length) return;
  isFlipped = !isFlipped;
  document.getElementById('flashcard-inner').classList.toggle('flipped');
}

// --- TTS using Web Speech API ---
function speak(text) {
  if (!text) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

document.getElementById('flashcard').addEventListener('click', flipCard);
document.getElementById('card-speak-btn').addEventListener('click', function(e) {
  e.stopPropagation();
  const word = document.getElementById('card-word').textContent;
  speak(word);
});

async function answerCard(result) {
  if (isFinished || cardIndex >= cards.length) return;
  const c = cards[cardIndex];
  await api(`/api/cards/${c.id}/review`, {
    method: 'POST',
    body: JSON.stringify({ result }),
  });
  cardResults.push(result);
  cardIndex++;
  renderCard();
}

function showSummary() {
  isFinished = true;
  document.getElementById('flashcard').style.display = 'none';
  document.querySelector('.action-row').style.display = 'none';
  document.getElementById('review-progress').style.display = 'none';
  const summary = document.getElementById('summary');
  summary.style.display = 'flex';
  const known = cardResults.filter(r => r === 1).length;
  const total = cardResults.length;
  const pct = total ? Math.round(known / total * 100) : 0;
  const color = pct >= 60 ? 'var(--success)' : 'var(--danger)';
  summary.innerHTML = `
    <div class="summary-emoji">🎉</div>
    <div class="summary-title">完成！</div>
    <div class="summary-meta">共 ${total} 张卡片</div>
    <div class="summary-meta">认识 ${known}  不认识 ${total - known}</div>
    <div class="summary-bar"><div class="summary-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="summary-pct" style="color:${color}">掌握率 ${pct}%</div>
    <div class="summary-actions">
      <button class="btn btn-primary" onclick="restartReview()">再来一次</button>
      <button class="btn btn-secondary" onclick="backFromCards()">返回</button>
    </div>
  `;
}

function restartReview() {
  cardIndex = 0;
  cardResults = [];
  isFinished = false;
  isFlipped = false;
  document.getElementById('summary').style.display = 'none';
  document.querySelector('.action-row').style.display = 'flex';
  document.getElementById('flashcard').style.display = 'flex';
  document.getElementById('review-progress').style.display = 'flex';
  renderCard();
}

// --- Profile ---
async function loadProfile() {
  const stats = await api('/api/stats');
  const container = document.getElementById('profile-content');
  let html = `
    <div class="stats-card">
      <div class="stat-row"><span class="stat-label">📊 总卡片数</span><span class="stat-value">${stats.total_cards}</span></div>
      <div class="stat-divider"></div>
      <div class="stat-row"><span class="stat-label">✅ 已复习</span><span class="stat-value">${stats.reviewed_cards}</span></div>
      <div class="stat-divider"></div>
      <div class="stat-row"><span class="stat-label">🎯 待复习</span><span class="stat-value">${stats.pending_cards}</span></div>
      <div class="stat-divider"></div>
      <div class="stat-row"><span class="stat-label">📈 完成率</span><span class="stat-value">${stats.completion_rate}%</span></div>
    </div>
    <div class="subject-progress">
      <div class="section-title">各科目进度</div>
  `;
  for (const s of stats.subjects) {
    html += `
      <div class="list-card" style="margin-bottom:6px;">
        <div style="font-size:14px;font-weight:600;">${s.icon} ${s.display_name}</div>
        <div class="subj-stat">${s.reviewed_cards}/${s.total_cards} (${s.progress_pct}%)</div>
        <div class="progress-bar"><div class="progress-bar-fill" style="width:${s.progress_pct}%"></div></div>
      </div>
    `;
  }
  html += '</div>';
  container.innerHTML = html;
}

// --- Import ---
function renderImport() {
  const container = document.getElementById('import-content');
  container.innerHTML = `
    <div class="import-card">
      <div class="import-label">选择科目</div>
      <div class="import-radio-group">
        <label class="import-radio"><input type="radio" name="import-subject" value="english" checked> 考研英语</label>
        <label class="import-radio"><input type="radio" name="import-subject" value="politics"> 考研政治</label>
      </div>
      <div class="import-label">章节名称（可选）</div>
      <input class="import-input" id="import-topic" placeholder="输入新章节名称，或留空自动命名">
      <div class="import-label">选择文件</div>
      <div class="import-file-row">
        <span class="file-name" id="import-file-name">未选择文件</span>
        <button class="import-btn import-btn-primary" onclick="pickFile()">选择文件</button>
      </div>
    </div>
    <div id="import-preview-area"></div>
    <button class="import-btn import-btn-primary" id="import-submit-btn" style="width:100%;height:44px;border-radius:22px;font-size:15px;margin-bottom:12px;" disabled onclick="doImport()">确认导入</button>
    <div class="import-status" id="import-status"></div>
  `;
  document.getElementById('file-input')?.remove();
  const fi = document.createElement('input');
  fi.type = 'file';
  fi.id = 'file-input';
  fi.accept = '.csv,.json,.txt';
  fi.onchange = handleFile;
  document.body.appendChild(fi);
}

let importFileData = null;

function pickFile() {
  document.getElementById('file-input').click();
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('import-file-name').textContent = file.name;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const text = ev.target.result;
    const ext = file.name.split('.').pop().toLowerCase();
    try {
      let rows = [];
      if (ext === 'csv') {
        const lines = text.split('\n').filter(l => l.trim());
        if (lines.length < 2) throw new Error('CSV 数据不足');
        const headers = parseCSVLine(lines[0]);
        const data = [];
        for (let i = 1; i < lines.length; i++) {
          const vals = parseCSVLine(lines[i]);
          if (vals.length >= 2) data.push({ front: vals[0], back: vals[1] });
        }
        rows = data;
      } else if (ext === 'json') {
        const parsed = JSON.parse(text);
        if (!Array.isArray(parsed)) throw new Error('JSON 应为数组');
        rows = parsed.map(r => ({
          front: r.front || r.Front || r.word || '',
          back: r.back || r.Back || r.definition || r.meaning || '',
        })).filter(r => r.front && r.back);
      } else if (ext === 'txt') {
        rows = text.split('\n').filter(l => l.trim()).map(l => {
          const parts = l.includes('|') ? l.split('|') : l.split('\t');
          return parts.length >= 2 ? { front: parts[0].trim(), back: parts[1].trim() } : null;
        }).filter(Boolean);
      }
      if (!rows.length) throw new Error('未找到有效数据');
      importFileData = rows;
      showImportPreview(rows);
      document.getElementById('import-submit-btn').disabled = false;
      document.getElementById('import-status').textContent = `✅ 共 ${rows.length} 条，预览前 10 条`;
      document.getElementById('import-status').className = 'import-status status-ok';
    } catch (err) {
      document.getElementById('import-status').textContent = `❌ 读取失败：${err.message}`;
      document.getElementById('import-status').className = 'import-status status-err';
      document.getElementById('import-submit-btn').disabled = true;
    }
  };
  reader.readAsText(file);
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"') {
        if (i + 1 < line.length && line[i + 1] === '"') { current += '"'; i++; }
        else inQuotes = false;
      } else current += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { result.push(current.trim()); current = ''; }
      else current += ch;
    }
  }
  result.push(current.trim());
  return result;
}

function showImportPreview(rows) {
  const area = document.getElementById('import-preview-area');
  area.innerHTML = rows.slice(0, 10).map((r, i) => `
    <div class="preview-item">
      <div class="p-front">${i + 1}. ${r.front}</div>
      <div class="p-back">${(r.back || '').substring(0, 60)}</div>
    </div>
  `).join('');
}

async function doImport() {
  if (!importFileData) return;
  const subject = document.querySelector('input[name="import-subject"]:checked').value;
  const topic = document.getElementById('import-topic').value.trim();
  const btn = document.getElementById('import-submit-btn');
  btn.disabled = true;
  btn.textContent = '导入中...';
  try {
    const result = await api('/api/import', {
      method: 'POST',
      body: JSON.stringify({ subject, topic, cards: importFileData }),
    });
    document.getElementById('import-status').textContent = `✅ 成功导入 ${result.count} 张卡片到「${result.topic}」`;
    document.getElementById('import-status').className = 'import-status status-ok';
    importFileData = null;
    document.getElementById('import-preview-area').innerHTML = '';
  } catch (err) {
    document.getElementById('import-status').textContent = `❌ 导入失败：${err.message}`;
    document.getElementById('import-status').className = 'import-status status-err';
  } finally {
    btn.disabled = false;
    btn.textContent = '确认导入';
  }
}

loadSubjects();
