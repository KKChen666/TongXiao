<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TongXiao Logo 方案预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f5f5;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 40px 20px;
    }
    h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 2rem; }
    .subtitle { text-align: center; color: #666; margin-bottom: 40px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
    .card-header {
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; font-weight: 600; font-size: 1.1rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
    .card-body {
      padding: 40px; display: flex; justify-content: center; align-items: center;
      min-height: 220px; background: #fafafa;
    }
    .logo-container { width: 100%; max-width: 450px; }
    .logo-container svg { width: 100%; height: auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .card-footer { padding: 25px; background: white; }
    .card-footer h3 { color: #333; margin-bottom: 10px; font-size: 1rem; }
    .card-footer p { color: #666; font-size: 0.9rem; line-height: 1.6; }
    .selected { border: 4px solid #667eea; transform: scale(1.02); }
    .selected .card-header { background: linear-gradient(135deg, #10B981 0%, #059669 100%); }
    .instructions {
      text-align: center; margin-top: 40px; padding: 30px;
      background: white; border-radius: 16px; max-width: 600px;
      margin-left: auto; margin-right: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .instructions p { color: #666; line-height: 1.8; margin-bottom: 10px; }
    .highlight { background: linear-gradient(120deg, #a8edea 0%, #fed6e3 100%); padding: 2px 8px; border-radius: 4px; font-weight: 500; }
  </style>
</head>
<body>
  <h1>TongXiao Logo</h1>
  <p class="subtitle">基于原方案六极简风格，去掉两边图案</p>

  <div class="grid">
    <div class="card" onclick="selectCard(this)">
      <div class="card-header">
        <span>方案A：彩色圆点</span>
      </div>
      <div class="card-body">
        <div class="logo-container">
          <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
            <rect width="400" height="200" rx="20" fill="#FAFAFA"/>
            <text x="200" y="80" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#333" text-anchor="middle" letter-spacing="2">TongXiao</text>
            <circle cx="160" cy="110" r="4" fill="#FF6B6B"/>
            <circle cx="180" cy="110" r="6" fill="#4ECDC4"/>
            <circle cx="200" cy="110" r="8" fill="#45B7D1"/>
            <circle cx="220" cy="110" r="6" fill="#96CEB4"/>
            <circle cx="240" cy="110" r="4" fill="#FF6B6B"/>
            <text x="200" y="150" font-family="Arial, sans-serif" font-size="12" fill="#999" text-anchor="middle" letter-spacing="8">LEARNING APP</text>
          </svg>
        </div>
      </div>
      <div class="card-footer">
        <h3>彩色圆点</h3>
        <p>保留圆点装饰，简洁有活力。</p>
      </div>
    </div>

    <div class="card" onclick="selectCard(this)">
      <div class="card-header">
        <span>方案B：底部横线</span>
      </div>
      <div class="card-body">
        <div class="logo-container">
          <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
            <rect width="400" height="200" rx="20" fill="#FAFAFA"/>
            <text x="200" y="80" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#333" text-anchor="middle" letter-spacing="2">TongXiao</text>
            <rect x="120" y="100" width="160" height="2" fill="#E2E8F0" rx="1"/>
            <text x="200" y="130" font-family="Arial, sans-serif" font-size="12" fill="#999" text-anchor="middle" letter-spacing="8">LEARNING APP</text>
          </svg>
        </div>
      </div>
      <div class="card-footer">
        <h3>底部横线</h3>
        <p>细线分隔，更正式稳重。</p>
      </div>
    </div>

    <div class="card" onclick="selectCard(this)">
      <div class="card-header">
        <span>方案C：纯净版</span>
      </div>
      <div class="card-body">
        <div class="logo-container">
          <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
            <rect width="400" height="200" rx="20" fill="#FAFAFA"/>
            <text x="200" y="80" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#333" text-anchor="middle" letter-spacing="3">TongXiao</text>
            <text x="200" y="120" font-family="Arial, sans-serif" font-size="12" fill="#999" text-anchor="middle" letter-spacing="8">LEARNING APP</text>
          </svg>
        </div>
      </div>
      <div class="card-footer">
        <h3>纯净无装饰</h3>
        <p>只保留文字，最大程度简洁。</p>
      </div>
    </div>
  </div>

  <div class="instructions">
    <p>点击卡片 <span class="highlight">选中</span>，告诉我选 <strong>A / B / C</strong></p>
  </div>

  <script>
    function selectCard(card) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
    }
  </script>
</body>
</html>
